services:
  scanner-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: system-revamp-scanner
    command: uvicorn scanner_service.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  drivers-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: system-revamp-drivers
    command: uvicorn drivers_service.drivers_api:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    restart: unless-stopped

  version-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: system-revamp-version
    command: uvicorn version_service.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: system-revamp-frontend
    ports:
      - "3000:80"
    depends_on:
      - scanner-api
      - drivers-api
      - version-api
    restart: unless-stopped
